<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus — Innovation Platform</title>
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: #16171d;
            --border-color: #282a36;
            --text-main: #ffffff;
            --text-muted: #a8a8b3;
            --accent-color: #ff79c6;
            --accent-glow: rgba(255, 121, 198, 0.15);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding: 20px;
            background-color: var(--card-bg);
        }

        .nav-container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text-main);
        }

        .logo span {
            color: var(--accent-color);
        }

        main {
            flex: 1;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 60px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-section {
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 16px;
            line-height: 1.1;
        }

        .hero-section p {
            font-size: 1.2rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .cta-btn {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(255, 121, 198, 0.3);
        }

        footer {
            padding: 30px 20px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            background-color: var(--card-bg);
        }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">NEXUS<span>.</span></div>
        </div>
    </header>

    <main>
        <div class="hero-section">
            <h1>The Future of Web Development</h1>
            <p>Welcome to Nexus. Explore custom web architecture, interactive interface design, and clean, modular application systems engineered for modern browsers.</p>
            <button class="cta-btn" onclick="alert('Portal initialization complete.')">Launch Workspace</button>
        </div>
    </main>

    <footer>
        &copy; 2026 Nexus Development Group. All rights reserved.
    </footer>

</body>
</html>
