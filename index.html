<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Testing Node</title>
    <style>
        body {
            font-family: monospace;
            background: #0d0e12;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .test-box {
            background: #16171d;
            border: 1px solid #282a36;
            padding: 24px;
            border-radius: 8px;
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #50fa7b; font-size: 1.2rem; margin-bottom: 8px; }
        p { color: #a8a8b3; font-size: 0.9rem; margin-top: 0; }
    </style>
</head>
<body>

    <div class="test-box">
        <h1>Static Node Active</h1>
        <p>Pushing experimental payload to static cloud path...</p>
    </div>

    <!-- FIREBASE MODULE INTEGRATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your verified project configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:128af196a1eb3dd5999306"
        };

        // Initialize Firebase Node
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        function sendStaticPayload() {
            // Your assigned static folder ID
            const staticId = "test-client-01";

            // Commit a fixed test structure straight to that specific path
            set(ref(database, 'experimental_nodes/' + staticId), {
                node_identifier: staticId,
                status: "Operational",
                environment: "Sandbox Test",
                last_ping: new Date().toISOString()
            })
            .then(() => {
                console.log("Static database packet updated successfully.");
            })
            .catch((error) => {
                console.error("Database transmission dropped:", error);
            });
        }

        // Run automatically when the webpage hits the browser environment
        sendStaticPayload();
    </script>
</body>
</html>
